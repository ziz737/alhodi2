<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" width="220" height="80">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8a84b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8c96a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8a84b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#162650;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="40" cy="40" r="36" fill="url(#navyGrad)"/>
  <circle cx="40" cy="40" r="33" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
  
  <!-- Building icon -->
  <!-- Main building -->
  <rect x="24" y="28" width="18" height="24" rx="1" fill="url(#goldGrad)"/>
  <!-- Tower -->
  <rect x="30" y="18" width="9" height="12" rx="1" fill="url(#goldGrad)"/>
  <!-- Windows on main building -->
  <rect x="27" y="32" width="4" height="4" rx="0.5" fill="#0d1b3e"/>
  <rect x="34" y="32" width="4" height="4" rx="0.5" fill="#0d1b3e"/>
  <rect x="27" y="39" width="4" height="4" rx="0.5" fill="#0d1b3e"/>
  <rect x="34" y="39" width="4" height="4" rx="0.5" fill="#0d1b3e"/>
  <!-- Windows on tower -->
  <rect x="32" y="21" width="4" height="3" rx="0.5" fill="#0d1b3e"/>
  <!-- Small building right -->
  <rect x="44" y="35" width="12" height="17" rx="1" fill="#c8a84b" opacity="0.7"/>
  <!-- Windows small building -->
  <rect x="46" y="38" width="3" height="3" rx="0.5" fill="#0d1b3e"/>
  <rect x="51" y="38" width="3" height="3" rx="0.5" fill="#0d1b3e"/>
  <!-- Ground line -->
  <line x1="16" y1="52" x2="64" y2="52" stroke="url(#goldGrad)" stroke-width="1.5"/>
  <!-- Stars -->
  <text x="40" y="62" text-anchor="middle" fill="url(#goldGrad)" font-size="7" font-family="Arial">✦ ✦ ✦</text>
  
  <!-- Text: الحودي -->
  <text x="130" y="28" text-anchor="middle" fill="url(#goldGrad)" font-size="20" font-weight="bold" font-family="Cairo, Arial">الحودي</text>
  <!-- Divider line -->
  <line x1="80" y1="35" x2="180" y2="35" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.5"/>
  <!-- Text: للتسويق العقاري -->
  <text x="130" y="50" text-anchor="middle" fill="#ffffff" font-size="12" font-family="Cairo, Arial">للتسويق العقاري</text>
  <!-- License -->
  <text x="130" y="65" text-anchor="middle" fill="#c8a84b" font-size="8" font-family="Cairo, Arial" opacity="0.8">رخصة فال: 1100050560</text>
</svg>
